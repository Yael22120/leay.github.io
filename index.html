<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leay — Liens</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.25rem;
    background: #f0f0f5;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(120, 180, 255, 0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(200, 140, 255, 0.30) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 50% 50%, rgba(255, 200, 120, 0.18) 0%, transparent 70%);
    animation: meshMove 12s ease-in-out infinite alternate;
    z-index: 0;
  }

  @keyframes meshMove {
    0%   { background-position: 0% 0%, 100% 100%, 50% 50%; }
    100% { background-position: 10% 20%, 90% 80%, 55% 45%; }
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 380px;
  }

  .avatar {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(20px) saturate(1.8);
    -webkit-backdrop-filter: blur(20px) saturate(1.8);
    border: 1px solid rgba(255, 255, 255, 0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 300;
    color: rgba(0, 0, 0, 0.55);
    letter-spacing: -1px;
    margin-bottom: 1.1rem;
    box-shadow:
      0 2px 20px rgba(0,0,0,0.08),
      inset 0 1px 0 rgba(255,255,255,0.9);
    overflow: hidden;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }

  .name {
    font-size: 23px;
    font-weight: 600;
    letter-spacing: -0.6px;
    color: rgba(0, 0, 0, 0.85);
    margin-bottom: 0.3rem;
  }

  .tagline {
    font-size: 14px;
    font-weight: 400;
    color: rgba(0, 0, 0, 0.45);
    margin-bottom: 2.2rem;
    letter-spacing: 0.1px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 13px 16px;
    border-radius: 18px;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    background: rgba(255, 255, 255, 0.38);
    backdrop-filter: blur(28px) saturate(2) brightness(1.05);
    -webkit-backdrop-filter: blur(28px) saturate(2) brightness(1.05);
    border: 1px solid rgba(255, 255, 255, 0.72);
    box-shadow:
      0 2px 12px rgba(0, 0, 0, 0.07),
      0 1px 3px rgba(0, 0, 0, 0.05),
      inset 0 1px 0 rgba(255, 255, 255, 0.85),
      inset 0 -1px 0 rgba(255, 255, 255, 0.25);
  }

  .link-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 8px;
    right: 8px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9) 40%, rgba(255,255,255,0.9) 60%, transparent);
    border-radius: 1px;
  }

  .link-item::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    background: rgba(255,255,255,0);
    transition: background 0.2s ease;
    pointer-events: none;
  }

  .link-item:hover {
    transform: translateY(-2px);
    box-shadow:
      0 6px 24px rgba(0, 0, 0, 0.10),
      0 2px 6px rgba(0, 0, 0, 0.06),
      inset 0 1px 0 rgba(255, 255, 255, 0.95),
      inset 0 -1px 0 rgba(255, 255, 255, 0.3);
  }

  .link-item:hover::after { background: rgba(255, 255, 255, 0.10); }

  .link-item:active {
    transform: translateY(0) scale(0.985);
    box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
  }

  .link-icon {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 19px;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.65);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 4px rgba(0,0,0,0.06);
  }

  .link-icon svg { width: 20px; height: 20px; }

  .link-text { flex: 1; min-width: 0; }

  .link-label {
    font-size: 15px;
    font-weight: 500;
    color: rgba(0, 0, 0, 0.82);
    letter-spacing: -0.1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-sub {
    font-size: 12px;
    color: rgba(0, 0, 0, 0.38);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-arrow {
    color: rgba(0, 0, 0, 0.25);
    font-size: 13px;
    flex-shrink: 0;
    transition: transform 0.18s ease, color 0.18s ease;
  }

  .link-item:hover .link-arrow {
    transform: translateX(3px);
    color: rgba(0, 0, 0, 0.45);
  }

  .ic-instagram { color: #c13584; }
  .ic-x         { color: rgba(0,0,0,0.75); }
  .ic-linkedin  { color: #0077b5; }
  .ic-github    { color: rgba(0,0,0,0.75); }
  .ic-youtube   { color: #ff0000; }
  .ic-tiktok    { color: rgba(0,0,0,0.75); }
  .ic-web       { color: #007aff; }
  .ic-mail      { color: #34aadc; }

  .footer {
    margin-top: 2.2rem;
    font-size: 11px;
    color: rgba(0,0,0,0.28);
    letter-spacing: 0.15px;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #0f0f14; }
    body::before {
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(80, 140, 255, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(160, 80, 255, 0.20) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 50% 50%, rgba(255, 160, 60, 0.10) 0%, transparent 70%);
    }
    .avatar {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.55);
      box-shadow: 0 2px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .name    { color: rgba(255,255,255,0.90); }
    .tagline { color: rgba(255,255,255,0.40); }
    .link-item {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      box-shadow:
        0 2px 12px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -1px 0 rgba(255,255,255,0.05);
    }
    .link-item:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.22);
    }
    .link-item::before {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18) 40%, rgba(255,255,255,0.18) 60%, transparent);
    }
    .link-item:hover::after { background: rgba(255,255,255,0.04); }
    .link-icon {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 1px 4px rgba(0,0,0,0.3);
    }
    .link-label { color: rgba(255,255,255,0.85); }
    .link-sub   { color: rgba(255,255,255,0.35); }
    .link-arrow { color: rgba(255,255,255,0.25); }
    .link-item:hover .link-arrow { color: rgba(255,255,255,0.5); }
    .ic-tiktok { color: rgba(255,255,255,0.75); }
    .footer { color: rgba(255,255,255,0.22); }
  }

  @media (max-width: 420px) {
    body { padding: 2rem 1rem; }
    .container { max-width: 100%; }
  }
</style>
</head>
